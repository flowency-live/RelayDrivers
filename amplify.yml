version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install Flutter
        - |
          if ! command -v flutter &> /dev/null; then
            echo "Installing Flutter..."
            curl -sS https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.4-stable.tar.xz | tar xJf -
            export PATH="$PATH:$(pwd)/flutter/bin"
          fi
        - export PATH="$PATH:$(pwd)/flutter/bin"
        - flutter --version
        - flutter pub get
    build:
      commands:
        - export PATH="$PATH:$(pwd)/flutter/bin"
        - flutter build web --release --base-href /
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - flutter/**/*
      - .pub-cache/**/*
